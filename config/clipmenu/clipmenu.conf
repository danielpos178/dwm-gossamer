# clipmenu configuration — installed to ~/.config/clipmenu/clipmenu.conf
# See `man clipmenu.conf` for all options.

# Use rofi as the selection UI (matches dwm-titus launcher)
CM_LAUNCHER=rofi

# Storage location (default: ~/.cache/clipmenu)
# CM_DIR="${XDG_CACHE_HOME:-$HOME/.cache}/clipmenu"

# Maximum clipboard entries to retain (0 = unlimited)
CM_MAX_CLIPS=50

# Monitor all three X11 selections
# CM_MONITOR_CLIPBOARD=true
# CM_MONITOR_PRIMARY=true
# CM_MONITOR_SECONDARY=true

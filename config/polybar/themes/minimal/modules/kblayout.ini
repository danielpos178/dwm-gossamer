; ── Keyboard Layout Module ────────────────────────────────────────────────────
;
; Displays the current keyboard layout in the bar.
; Updates on layout change via SIGUSR1 signal.
;
; Scroll up/down to cycle layouts.
; Requires: dwm-kblayout (scripts/) and kblayout.sh (polybar/scripts/)

[module/kblayout]
type = custom/script
exec = $HOME/.config/polybar/scripts/kblayout.sh --polybar
interval = 0
signal = 12

; Format
format = <label>
format-foreground = ${colors.fg-alt}
format-padding = 2px

label = %{T2}%output%%{T-}
label-padding = 0

; Scroll to cycle layouts
scroll-up = $HOME/.config/polybar/scripts/kblayout.sh --scroll-up
scroll-down = $HOME/.config/polybar/scripts/kblayout.sh --scroll-down
